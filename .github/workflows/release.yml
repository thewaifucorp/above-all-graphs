name: release

# Tag a version (v0.1.0) to build prebuilt binaries for every supported
# platform and attach them to a GitHub Release — the npm wrapper's
# postinstall downloads from here, so end users never compile anything
# (SPEC.md section 0).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0) — must already exist"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Both mac targets build on the Apple Silicon runner: rustc/clang
          # cross-compile x86_64-apple-darwin fine from an arm64 host, and
          # it avoids depending on macos-13's Intel runner capacity, which
          # GitHub has been queuing for 30+ min (deprecated pool).
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf aag-${{ matrix.target }}.tar.gz aag
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path aag.exe -DestinationPath aag-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: aag-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/aag-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/aag-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
